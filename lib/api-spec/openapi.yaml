openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: ShaadiHub Wedding Marketplace API
servers:
  - url: /api
    description: Base API path

tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication
  - name: vendors
    description: Vendor operations
  - name: users
    description: User operations
  - name: bookings
    description: Booking operations
  - name: admin
    description: Admin operations

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    UserRole:
      type: string
      enum: [user, vendor, admin]

    BookingStatus:
      type: string
      enum: [pending, approved, rejected, cancelled]

    SubscriptionPlan:
      type: string
      enum: [free, premium]

    VendorCategory:
      type: string
      enum:
        - Marriage Hall
        - Catering
        - Photography
        - Videography
        - Decoration
        - Car Rental
        - Event Planner
        - Makeup & Beauty

    User:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        email:
          type: string
        role:
          $ref: "#/components/schemas/UserRole"
        phone:
          type: string
          nullable: true
        avatarUrl:
          type: string
          nullable: true
        isActive:
          type: boolean
        isBlocked:
          type: boolean
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - name
        - email
        - role
        - isActive
        - isBlocked
        - createdAt

    VendorImage:
      type: object
      properties:
        id:
          type: integer
        vendorId:
          type: integer
        imageUrl:
          type: string
        publicId:
          type: string
      required:
        - id
        - vendorId
        - imageUrl
        - publicId

    Package:
      type: object
      properties:
        id:
          type: integer
        vendorId:
          type: integer
        name:
          type: string
        description:
          type: string
          nullable: true
        price:
          type: number
        features:
          type: array
          items:
            type: string
        isPopular:
          type: boolean
      required:
        - id
        - vendorId
        - name
        - price
        - features
        - isPopular

    Vendor:
      type: object
      properties:
        id:
          type: integer
        userId:
          type: integer
        category:
          $ref: "#/components/schemas/VendorCategory"
        title:
          type: string
        description:
          type: string
          nullable: true
        location:
          type: string
          nullable: true
        area:
          type: string
          nullable: true
        city:
          type: string
        latitude:
          type: number
          nullable: true
        longitude:
          type: number
          nullable: true
        priceRangeMin:
          type: number
          nullable: true
        priceRangeMax:
          type: number
          nullable: true
        capacity:
          type: integer
          nullable: true
        whatsapp:
          type: string
          nullable: true
        coverImageUrl:
          type: string
          nullable: true
        verified:
          type: boolean
        isFeatured:
          type: boolean
        isSuspended:
          type: boolean
        rating:
          type: number
        totalReviews:
          type: integer
        profileViews:
          type: integer
        createdAt:
          type: string
          format: date-time
        images:
          type: array
          items:
            $ref: "#/components/schemas/VendorImage"
        packages:
          type: array
          items:
            $ref: "#/components/schemas/Package"
      required:
        - id
        - userId
        - category
        - title
        - city
        - verified
        - isFeatured
        - isSuspended
        - rating
        - totalReviews
        - profileViews
        - createdAt
        - images
        - packages

    Review:
      type: object
      properties:
        id:
          type: integer
        vendorId:
          type: integer
        userId:
          type: integer
        rating:
          type: integer
          minimum: 1
          maximum: 5
        comment:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
        userName:
          type: string
          nullable: true
        userAvatarUrl:
          type: string
          nullable: true
      required:
        - id
        - vendorId
        - userId
        - rating
        - createdAt

    Booking:
      type: object
      properties:
        id:
          type: integer
        vendorId:
          type: integer
        userId:
          type: integer
        packageId:
          type: integer
          nullable: true
        eventDate:
          type: string
          format: date
        guestCount:
          type: integer
          nullable: true
        notes:
          type: string
          nullable: true
        status:
          $ref: "#/components/schemas/BookingStatus"
        createdAt:
          type: string
          format: date-time
        vendorTitle:
          type: string
          nullable: true
        vendorCategory:
          type: string
          nullable: true
        vendorCoverImageUrl:
          type: string
          nullable: true
        packageName:
          type: string
          nullable: true
        userName:
          type: string
          nullable: true
      required:
        - id
        - vendorId
        - userId
        - eventDate
        - status
        - createdAt

    AdminStats:
      type: object
      properties:
        totalUsers:
          type: integer
        totalVendors:
          type: integer
        verifiedVendors:
          type: integer
        pendingVendors:
          type: integer
        totalBookings:
          type: integer
        totalReviews:
          type: integer
      required:
        - totalUsers
        - totalVendors
        - verifiedVendors
        - pendingVendors
        - totalBookings
        - totalReviews

    VendorListResponse:
      type: object
      properties:
        total:
          type: integer
        page:
          type: integer
        pages:
          type: integer
        vendors:
          type: array
          items:
            $ref: "#/components/schemas/Vendor"
      required:
        - total
        - page
        - pages
        - vendors

    AuthResponse:
      type: object
      properties:
        token:
          type: string
        user:
          $ref: "#/components/schemas/User"
        vendorId:
          type: integer
          nullable: true
      required:
        - token
        - user

    FavoriteToggleResponse:
      type: object
      properties:
        favorited:
          type: boolean
      required:
        - favorited

    MessageResponse:
      type: object
      properties:
        message:
          type: string
      required:
        - message

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  # AUTH
  /auth/register:
    post:
      operationId: register
      tags: [auth]
      summary: Register user or vendor
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                email:
                  type: string
                password:
                  type: string
                role:
                  $ref: "#/components/schemas/UserRole"
                phone:
                  type: string
                category:
                  $ref: "#/components/schemas/VendorCategory"
                title:
                  type: string
              required:
                - name
                - email
                - password
                - role
      responses:
        "201":
          description: Registered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                password:
                  type: string
              required:
                - email
                - password
      responses:
        "200":
          description: Logged in
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  # VENDORS
  /vendors:
    get:
      operationId: listVendors
      tags: [vendors]
      summary: List vendors with filters
      parameters:
        - name: category
          in: query
          schema:
            type: string
        - name: area
          in: query
          schema:
            type: string
        - name: city
          in: query
          schema:
            type: string
        - name: minPrice
          in: query
          schema:
            type: number
        - name: maxPrice
          in: query
          schema:
            type: number
        - name: minRating
          in: query
          schema:
            type: number
        - name: capacity
          in: query
          schema:
            type: integer
        - name: search
          in: query
          schema:
            type: string
        - name: featured
          in: query
          schema:
            type: boolean
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 12
      responses:
        "200":
          description: Vendor list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VendorListResponse"

    post:
      operationId: createVendor
      tags: [vendors]
      summary: Create vendor listing
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                category:
                  $ref: "#/components/schemas/VendorCategory"
                title:
                  type: string
                description:
                  type: string
                location:
                  type: string
                area:
                  type: string
                city:
                  type: string
                latitude:
                  type: number
                longitude:
                  type: number
                priceRangeMin:
                  type: number
                priceRangeMax:
                  type: number
                capacity:
                  type: integer
                whatsapp:
                  type: string
              required:
                - category
                - title
      responses:
        "201":
          description: Vendor created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Vendor"

  /vendors/me/profile:
    get:
      operationId: getMyVendorProfile
      tags: [vendors]
      summary: Get logged-in vendor profile
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Vendor profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Vendor"

  /vendors/{id}:
    get:
      operationId: getVendor
      tags: [vendors]
      summary: Get vendor detail
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Vendor detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Vendor"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

    put:
      operationId: updateVendor
      tags: [vendors]
      summary: Update vendor listing
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                category:
                  $ref: "#/components/schemas/VendorCategory"
                title:
                  type: string
                description:
                  type: string
                location:
                  type: string
                area:
                  type: string
                city:
                  type: string
                latitude:
                  type: number
                longitude:
                  type: number
                priceRangeMin:
                  type: number
                priceRangeMax:
                  type: number
                capacity:
                  type: integer
                whatsapp:
                  type: string
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Vendor"

  /vendors/{id}/images:
    post:
      operationId: uploadVendorImage
      tags: [vendors]
      summary: Upload vendor image
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
              required:
                - file
      responses:
        "201":
          description: Image uploaded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VendorImage"

  /vendors/{id}/images/{imageId}:
    delete:
      operationId: deleteVendorImage
      tags: [vendors]
      summary: Delete vendor image
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: imageId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /vendors/{id}/packages:
    post:
      operationId: createPackage
      tags: [vendors]
      summary: Add pricing package
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                description:
                  type: string
                price:
                  type: number
                features:
                  type: array
                  items:
                    type: string
                isPopular:
                  type: boolean
              required:
                - name
                - price
      responses:
        "201":
          description: Package created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Package"

  /vendors/{id}/packages/{pkgId}:
    put:
      operationId: updatePackage
      tags: [vendors]
      summary: Update package
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: pkgId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                description:
                  type: string
                price:
                  type: number
                features:
                  type: array
                  items:
                    type: string
                isPopular:
                  type: boolean
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Package"

    delete:
      operationId: deletePackage
      tags: [vendors]
      summary: Delete package
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: pkgId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  # USERS
  /users/me:
    get:
      operationId: getMe
      tags: [users]
      summary: Get current user
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"

    put:
      operationId: updateMe
      tags: [users]
      summary: Update current user
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                phone:
                  type: string
                avatarUrl:
                  type: string
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"

  /users/favorites/{vendorId}:
    post:
      operationId: toggleFavorite
      tags: [users]
      summary: Toggle favorite vendor
      security:
        - bearerAuth: []
      parameters:
        - name: vendorId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Favorite toggled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FavoriteToggleResponse"

  /users/favorites:
    get:
      operationId: getFavorites
      tags: [users]
      summary: Get all favorited vendors
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Favorited vendors
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Vendor"

  /users/bookings:
    post:
      operationId: createBooking
      tags: [users]
      summary: Create booking request
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                vendorId:
                  type: integer
                packageId:
                  type: integer
                eventDate:
                  type: string
                  format: date
                guestCount:
                  type: integer
                notes:
                  type: string
              required:
                - vendorId
                - eventDate
      responses:
        "201":
          description: Booking created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Booking"

    get:
      operationId: getUserBookings
      tags: [users]
      summary: Get user bookings
      security:
        - bearerAuth: []
      responses:
        "200":
          description: User bookings
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Booking"

  /users/reviews/{vendorId}:
    get:
      operationId: getVendorReviews
      tags: [users]
      summary: Get reviews for vendor
      parameters:
        - name: vendorId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Reviews
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Review"

    post:
      operationId: createReview
      tags: [users]
      summary: Add review for vendor
      security:
        - bearerAuth: []
      parameters:
        - name: vendorId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                rating:
                  type: integer
                  minimum: 1
                  maximum: 5
                comment:
                  type: string
              required:
                - rating
      responses:
        "201":
          description: Review created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Review"

  # BOOKINGS
  /bookings/vendor:
    get:
      operationId: getVendorBookings
      tags: [bookings]
      summary: Get all bookings for logged-in vendor
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Vendor bookings
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Booking"

  /bookings/{id}/status:
    put:
      operationId: updateBookingStatus
      tags: [bookings]
      summary: Update booking status
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: status
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/BookingStatus"
      responses:
        "200":
          description: Status updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Booking"

  # ADMIN
  /admin/stats:
    get:
      operationId: getAdminStats
      tags: [admin]
      summary: Get platform statistics
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminStats"

  /admin/vendors:
    get:
      operationId: adminListVendors
      tags: [admin]
      summary: List all vendors (admin)
      security:
        - bearerAuth: []
      responses:
        "200":
          description: All vendors
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Vendor"

  /admin/vendors/{id}/approve:
    put:
      operationId: approveVendor
      tags: [admin]
      summary: Approve vendor
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Approved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Vendor"

  /admin/vendors/{id}/suspend:
    put:
      operationId: suspendVendor
      tags: [admin]
      summary: Toggle vendor suspension
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Suspension toggled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Vendor"

  /admin/vendors/{id}/feature:
    put:
      operationId: featureVendor
      tags: [admin]
      summary: Toggle vendor featured status
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Featured toggled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Vendor"

  /admin/vendors/{id}:
    delete:
      operationId: adminDeleteVendor
      tags: [admin]
      summary: Delete vendor
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /admin/users:
    get:
      operationId: adminListUsers
      tags: [admin]
      summary: List all users (admin)
      security:
        - bearerAuth: []
      responses:
        "200":
          description: All users
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/User"

  /admin/users/{id}/block:
    put:
      operationId: blockUser
      tags: [admin]
      summary: Toggle user block status
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Block toggled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
